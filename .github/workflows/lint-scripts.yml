name: Lint Miscellaneous Scripts

'on':
  push:
    paths:
      - '**.sh'
      - '**.py'
      - '**.yml'
      - '**.yaml'
      - '.shellcheckrc'
      - '.yamllint.yml'
      - '.github/workflows/lint-scripts.yml'
  pull_request:
    paths:
      - '**.sh'
      - '**.py'
      - '**.yml'
      - '**.yaml'
      - '.shellcheckrc'
      - '.yamllint'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shellcheck:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    timeout-minutes: &job_timeout 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          lfs: false

      - name: Run ShellCheck
        # v2.0.0
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        with:
          severity: warning
          format: gcc

  python-lint:
    name: Lint Python Scripts
    runs-on: ubuntu-latest
    timeout-minutes: *job_timeout
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint

      - name: Run flake8
        run: |
          flake8 cli/ servers/ script/ deploy/services/cli/ deploy/workspace/ \
            --count --select=E9,F63,F7,F82 --show-source \
            --statistics \
            --exclude=venv,.venv,__pycache__,.git || \
            echo "No Python files to lint"
          flake8 cli/ servers/ script/ deploy/services/cli/ \
            --count --max-complexity=10 --max-line-length=127 \
            --statistics \
            --exclude=venv,.venv,__pycache__,.git || \
            echo "No Python files to lint"

      - name: Run pylint
        run: |
          pylint cli/ servers/ script/ deploy/services/cli/ deploy/workspace/ \
            --rcfile='${{ github.workspace }}/.pylintrc' \
            --fail-under=9 --recursive=y || echo "No Python files to lint"

  yaml-lint:
    name: Lint YAML Files
    runs-on: ubuntu-latest
    timeout-minutes: *job_timeout
    permissions:
      contents: read
    steps:
      - name: Checkout code
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          lfs: false

      - name: Set up Python
        # v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run yamllint
        run: |
          yamllint .
