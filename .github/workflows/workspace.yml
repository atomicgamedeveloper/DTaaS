name: Workspace Packages

'on':
  push:
    paths:
      - 'deploy/workspace/**'
      - '.github/workflows/workspace.yml'
  pull_request:
    paths:
      - 'deploy/workspace/**'
      - '.github/workflows/workspace.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-dex-companion-for-localhost:
    name: Test Dex Companion Proxy for localhost
    permissions:
      contents: read  # Required for checking out the code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: deploy/workspace/dex/localhost

    steps:
      - name: Checkout Repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          lfs: false

      - name: Setup Python
        # v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Install lint dependencies
        run: pip install flake8 pylint ruff

      - name: Run flake8
        run: flake8 --count --max-complexity=10 --max-line-length=88 companion

      - name: Run pylint (min score 9.0)
        shell: bash
        run: |
          pylint companion --rcfile=${GITHUB_WORKSPACE}/.pylintrc \
            --recursive=y --fail-under=9.0

      - name: Run ruff format check
        run: ruff format --check companion

      - name: Run pytest with coverage
        run: |
          pytest --cov=companion/src --cov-report=xml \
            --cov-report=term-missing companion/test

      - name: Upload coverage to Codecov
        # v7.0.0
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          files: deploy/workspace/dex/localhost/coverage.xml
          flags: workspace-dex-companion
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
