name: Platform Services CLI

'on':
  push:
    branches:
      - 'feature/distributed-demo'
    paths:
      - 'deploy/services/cli/**'
      - '.github/workflows/platform-services-cli.yml'

  pull_request:
    paths:
      - 'deploy/services/cli/**'
      - '.github/workflows/platform-services-cli.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-services-cli:
    name: Test and Build Platform Services CLI
    permissions:
      contents: read  # Required for checking out the code
      actions: write  # Required for uploading artifacts
    uses: ./.github/workflows/python-reusable.yml
    with:
      working-directory: deploy/services/cli
      src-directory: dtaas_services
      tests-directory: tests
      coverage-file: deploy/services/cli/coverage.xml
      artifact-name: dtaas-services-cli
      run-pyright: true

  publish-pypi:
    name: Publish to PyPI
    needs: [test-services-cli]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/feature/distributed-demo'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC trusted publisher
    steps:
      - name: Download dist artefacts
        # v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dtaas-services-cli
          path: ./

      - name: Publish to PyPI
        # v1.14.0
        # yamllint disable-line rule:line-length
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: .
