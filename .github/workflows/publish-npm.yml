name: Test and Publish

'on':
  workflow_call:
    inputs:
      registry-url:
        required: true
        type: string
      directory:
        required: true
        type: string
      node-version:
        required: true
        type: string
      package-name:
        default: ''
        type: string
    secrets:
      NPM_TOKEN:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ inputs.registry-url }}-${{ inputs.directory }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      packages: write  # Push to github package registry
      contents: read   # Required for checking out the code
    defaults:
      run:
        working-directory: ${{ inputs.directory }}

    steps:
      - name: Checkout
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          lfs: false

      - name: Setup node
        # v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}

      - name: Rename package name in package.json
        if: ${{ inputs.package-name != '' }}
        run: |
          sudo apt-get install -y jq
          jq '.name = "${{inputs.package-name}}"' package.json > temp.json
          mv temp.json package.json

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          yarn install
          yarn build
          yarn publish --access public
