# Reusable workflow for building and pushing a Docker Image to GHCR.
#
# Username is the repository owner converted to lowercase
# Password is taken from the auto-generated GitHub token

name: Build and Push Docker Image (GHCR)

'on':
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      version:
        required: true
        type: string
      dockerfile:
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  registry: ghcr.io
  password: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read  # Required for checking out the code
  packages: write  # Push to github package registry

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      packages: write  # Push to github package registry
      contents: read  # Required for checking out the code

    steps:
      - name: Checkout Repository
        # v6.0.1
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          lfs: false

      - name: Setup node for building the React client website
        if: ${{ inputs.image-name == 'dtaas-web' }}
        # v6.1.0
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f
        with:
          node-version: 24
          cache: "yarn"
          cache-dependency-path: "**/yarn.lock"

      - name: Build react client website
        if: ${{ inputs.image-name == 'dtaas-web' }}
        run: |
          cd client/
          yarn install --network-timeout 1000000
          yarn build

      - name: Resolve image variables
        id: image_vars
        run: |
          ghcr_scope="${REPOSITORY_OWNER,,}"
          image_repository="${REGISTRY}/${ghcr_scope}"
          image_base="${image_repository}/${IMAGE_NAME}"
          image_tag="${image_base}:${VERSION}"
          echo "ghcr_scope=$ghcr_scope" >> "$GITHUB_OUTPUT"
          echo "image_repository=$image_repository" >> "$GITHUB_OUTPUT"
          echo "image_base=$image_base" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REGISTRY: ${{ env.registry }}
          IMAGE_NAME: ${{ inputs.image-name }}
          VERSION: ${{ inputs.version }}

      - name: Log in to the Container registry
        # v3.6.0
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
        with:
          registry: ${{ env.registry }}
          username: ${{ github.actor }}
          password: ${{ env.password }}

      - name: Check if version exists
        id: check_version
        run: |
          IMAGE_TAG="${{ steps.image_vars.outputs.image_tag }}"
          if docker manifest inspect "$IMAGE_TAG" > /dev/null 2>&1; then
            echo "Version ${{ inputs.version }} already exists."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${{ inputs.version }} does not exist."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        if: steps.check_version.outputs.exists == 'false'
        # v6.18.0
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: ./developer/${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.image_vars.outputs.image_base }}:${{ inputs.version }}
            ${{ steps.image_vars.outputs.image_base }}:latest
