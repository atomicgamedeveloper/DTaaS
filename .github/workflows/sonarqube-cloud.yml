name: SonarQube Cloud

'on':
  push:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sonarqube-cloud:
    name: SonarQube Cloud
    if: github.repository != 'INTO-CPS-Association/DTaaS'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          lfs: false

      - name: Skip SonarQube Cloud scan
        if: >
          env.SONAR_TOKEN == '' ||
          env.SONAR_PROJECT_KEY == '' ||
          env.SONAR_ORGANIZATION == ''
        run: |
          echo "Skipping SonarQube Cloud scan."
          echo "Configure SONAR_TOKEN, SONAR_PROJECT_KEY, and SONAR_ORGANIZATION in this fork."

      - name: SonarQube Cloud scan
        if: >
          env.SONAR_TOKEN != '' &&
          env.SONAR_PROJECT_KEY != '' &&
          env.SONAR_ORGANIZATION != ''
        # v7
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
