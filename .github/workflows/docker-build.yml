# Reusable workflow for building a Docker image without pushing.
# Used to validate Dockerfiles on pull requests.

name: Build Docker Image

'on':
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      dockerfile:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-docker-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          lfs: false
          sparse-checkout: |
            client
            developer
            servers/lib
            servers/logger

      - name: Setup node
        if: ${{ inputs.dockerfile == 'client.built.dockerfile' }}
        # v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: "yarn"
          cache-dependency-path: "**/yarn.lock"

      - name: Install dependencies
        if: ${{ inputs.dockerfile == 'client.built.dockerfile' }}
        working-directory: client/
        run: |
          yarn install --network-timeout 1000000
          yarn playwright install --with-deps

      - name: Run the linting checks
        if: ${{ inputs.dockerfile == 'client.built.dockerfile' }}
        working-directory: client/
        run: |
          yarn syntax

      - name: Build the React SPA website and setup env
        if: ${{ inputs.dockerfile == 'client.built.dockerfile' }}
        working-directory: client/
        run: |
          yarn build
          yarn config:test

      - name: Build Docker image
        # v7.2.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./developer/${{ inputs.dockerfile }}
          push: false
          tags: ${{ inputs.image-name }}:test
