name: Logger microservice

'on':
  push:
    paths:
      - 'servers/logger/**'
      - 'developer/logger.dockerfile'
      - 'deploy/dtaas/docker/**'
      - '.github/workflows/logger-ms.yml'
  pull_request:
    paths:
      - 'servers/logger/**'
      - 'developer/logger.dockerfile'
      - 'deploy/dtaas/docker/**'
      - '.github/workflows/logger-ms.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  LOGGER_PORT: 4003
  LOGGER_LOG_FILE_PATH: logs/workflow-logs.jsonl
  LOGGER_TLS: false

permissions:
  contents: read

jobs:
  test-logger-ms:
    permissions:
      contents: read
    name: Test logger microservice
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: servers/logger

    steps:
      - name: Checkout
        # v6.0.1
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Setup node
        # v6.1.0
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: '**/yarn.lock'

      - name: Run linting and formatting checks
        run: |
          YARN_ENABLE_SCRIPTS=false yarn install --frozen-lockfile --ignore-scripts
          yarn syntax:check
          yarn format:check

      - name: Build the logger microservice
        run: |
          yarn build

      - name: Run tests
        run: |
          yarn test

      - name: Upload test coverage to Codecov
        # v5.5.2
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: servers/logger/coverage/clover.xml
          flags: logger-microservice-tests

      - name: Check logger microservice health
        env:
          NODE_NO_WARNINGS: '1'
          NODE_OPTIONS: >-
            --es-module-specifier-resolution=node
            --experimental-specifier-resolution=node
          PORT: ${{ env.LOGGER_PORT }}
        run: |
          yarn build
          node dist/src/main.js > logger-ms.log 2>&1 &
          logger_pid="$!"
          trap 'kill "$logger_pid" 2>/dev/null || true' EXIT
          for attempt in 1 2 3 4; do
            if curl -f -LI "http://localhost:${PORT}/logger/health"; then
              exit 0
            fi
            if ! kill -0 "$logger_pid" 2>/dev/null; then
              cat logger-ms.log
              exit 1
            fi
            sleep 10
          done
          cat logger-ms.log
          exit 1

  get-version:
    permissions:
      contents: read
    name: Get version and variables
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        # v6.0.1
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: get version
        id: get-version
        run: |
          version=$(jq -r '.version' ./servers/logger/package.json)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "node-version=$NODE_VERSION" >> $GITHUB_OUTPUT
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      node-version: ${{ steps.get-version.outputs.node-version }}

  publish-package-github:
    permissions:
      contents: read
      packages: write
    if: |
      github.event_name == 'push' &&
      (
        startsWith(github.ref, 'refs/heads/feature/') ||
        startsWith(github.ref, 'refs/heads/release-v')
      )

    name: Publish to GitHub Packages
    needs: [test-logger-ms, get-version]
    uses: ./.github/workflows/publish-npm.yml
    with:
      node-version: ${{ needs.get-version.outputs.node-version }}
      registry-url: 'https://npm.pkg.github.com/'
      directory: servers/logger
      package-name: ${{ vars.NPM_LOGGER_PACKAGE_NAME || '' }}
    secrets:
      NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-package-npm:
    permissions:
      contents: read
      packages: write
    if: |
      github.event_name == 'push' &&
      (
        startsWith(github.ref, 'refs/heads/feature/') ||
        startsWith(github.ref, 'refs/heads/release-v')
      )

    name: Publish to NPM
    needs: [get-version, test-logger-ms]
    uses: ./.github/workflows/publish-npm.yml
    with:
      node-version: ${{ needs.get-version.outputs.node-version }}
      registry-url: 'https://registry.npmjs.org'
      directory: servers/logger
      package-name: ${{ vars.NPM_LOGGER_PACKAGE_NAME || '' }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker-image-ghcr:
    permissions:
      contents: read
      packages: write
    if: |
      github.event_name == 'push' &&
      (
        startsWith(github.ref, 'refs/heads/feature/') ||
        startsWith(github.ref, 'refs/heads/release-v')
      )

    name: Publish Docker image (GHCR)
    needs: [get-version, test-logger-ms]
    uses: ./.github/workflows/docker-ghcr.yml
    with:
      image-name: logger-ms
      version: ${{ needs.get-version.outputs.version }}
      dockerfile: developer/logger.dockerfile
    secrets: inherit

  publish-docker-image-dockerhub:
    permissions:
      contents: read
      packages: write
    if: |
      github.event_name == 'push' &&
      (
        startsWith(github.ref, 'refs/heads/feature/') ||
        startsWith(github.ref, 'refs/heads/release-v')
      )

    name: Publish Docker image (DockerHub)
    needs: [get-version, test-logger-ms]
    uses: ./.github/workflows/docker-dockerhub.yml
    with:
      image-name: logger-ms
      version: ${{ needs.get-version.outputs.version }}
      dockerfile: developer/logger.dockerfile
      readme-file: servers/logger/DOCKER.md
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_SCOPE: ${{ secrets.DOCKERHUB_SCOPE }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
