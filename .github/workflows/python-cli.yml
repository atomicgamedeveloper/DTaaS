name: CLI for DTaaS

'on':
  push:
    paths:
      - 'cli/**'
      - '.github/workflows/python-cli.yml'
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/python-cli.yml'
  workflow_dispatch:


jobs:
  test-cli:
    name: Test and Build DTaaS CLI
    permissions:
      contents: read  # Required for checking out the code
      actions: write  # Required for uploading artifacts
      id-token: write  # Required for OIDC trusted publisher
    uses: ./.github/workflows/python-reusable.yml
    with:
      working-directory: cli
      src-directory: src
      tests-directory: tests
      coverage-file: cli/coverage.xml
      artifact-name: dtaas-cli
      run-pyright: true
      # yamllint disable-line rule:line-length
      publish: ${{ github.event_name == 'push' && github.ref == 'refs/heads/feature/distributed-demo' }}
