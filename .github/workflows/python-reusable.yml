name: Python Reusable Workflow

'on':
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory to run commands in'
        required: true
        type: string
      src-directory:
        description: 'Directory containing source code'
        required: true
        type: string
      tests-directory:
        description: 'Directory containing tests'
        required: true
        type: string
      coverage-file:
        description: 'Coverage XML file path'
        required: true
        type: string
      artifact-name:
        description: 'Name for uploaded artifact'
        required: true
        type: string
      run-pyright:
        description: 'Whether to run pyright type checking'
        required: false
        type: boolean
        default: false
      artifact-path:
        description: 'Path for artifact upload'
        required: true
        type: string
        default: 'dist'

jobs:
  python-tests:
    name: Test Python Package
    permissions:
      contents: read  # Required for checking out the code
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: &job_timeout 30
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout Repository
        # v6.0.1
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          lfs: false

      - name: Setup Python
        # v6.1.0
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: "3.12"

      - name: Install Poetry
        env:
          POETRY_HOME: ${{ runner.temp }}/poetry
        run: |
          python -m pip install --upgrade pip
          curl -sSL https://install.python-poetry.org | python -

      - name: Add Poetry to PATH (Linux/macOS)
        if: runner.os != 'Windows'
        run: echo "${{ runner.temp }}/poetry/bin" >> $GITHUB_PATH

      - name: Add Poetry to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "${{ runner.temp }}\poetry\bin" |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Install dev dependencies
        run: poetry install --with dev

      - name: Check Docker availability (Linux)
        if: runner.os == 'Linux'
        run: docker --version

      - name: Run pylint (min score 9.0)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          SRC_DIR: ${{ inputs.src-directory }}
          TESTS_DIR: ${{ inputs.tests-directory }}
        run: |
          poetry run pylint \
            "$SRC_DIR" \
            "$TESTS_DIR" \
            --rcfile=${GITHUB_WORKSPACE}/.pylintrc \
            --fail-under=9.0

      - name: Run pytest (with coverage, Linux only)
        if: matrix.os == 'ubuntu-latest'
        env:
          SRC_DIR: ${{ inputs.src-directory }}
        run: |
          poetry run pytest --cov="$SRC_DIR" --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        # v5
        uses: codecov/codecov-action@c23a129e932ebdcb56ca1565c68c6abdbf173769
        with:
          files: coverage.xml
          flags: cli-tests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build-python-package:
    name: Build Python Package
    needs: [python-tests]
    permissions:
      contents: read  # Required for checking out the code
      actions: write  # Required for uploading artifacts
    runs-on: ubuntu-latest
    timeout-minutes: *job_timeout
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout Repository
        # v6.0.1
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          lfs: false

      - name: Setup Python
        # v6.1.0
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: "3.12"

      - name: Install Poetry
        env:
          POETRY_HOME: ${{ runner.temp }}/poetry
        run: |
          python -m pip install --upgrade pip
          curl -sSL https://install.python-poetry.org | python -

      - name: Add Poetry to PATH
        run: echo "${{ runner.temp }}/poetry/bin" >> $GITHUB_PATH

      - name: Install runtime dependencies
        run: poetry install --only main

      - name: Build wheel and sdist
        run: |
          poetry build --format wheel
          poetry build --format sdist

      - name: Upload dist artefacts
        # v6.0.0
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/${{ inputs.artifact-path }}
          retention-days: 1
