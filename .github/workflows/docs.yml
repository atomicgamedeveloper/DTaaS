name: Build documentation

'on':
  push:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # Required for checking out the code

jobs:
  docs:
    name: Build html docs only
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read  # Required for checking out the code
    steps:
      - name: Checkout
        # v6.0.1
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.x'

      - name: Install MkDocs dependencies
        run: pip install -r script/docs/mkdocs-requirements-github.txt

      - name: build docs
        # MKDOCS_LFS_STRICT=false demotes the LFS check from an abort to a
        # warning so CI can still build docs when lfs: false is set above.
        # Remove this env var once lfs: true is restored.
        env:
          MKDOCS_LFS_STRICT: 'false'
        run: mkdocs build --config-file mkdocs-github.yml

      - name: show contents of compiled docs
        run: |
          ls -R site
