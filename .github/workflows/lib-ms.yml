name: Library microservice

'on':
  push:
    paths:
      - 'servers/lib/**'
  pull_request:
    paths:
      - 'servers/lib/**'
      - 'developer/libms.dockerfile'
      - 'developer/config/libms.dev.yaml.example'
      - '.github/workflows/lib-ms.yml'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 24
  HTTP_PORT: 4002
  LIBMS_CONFIG_PATH: test/libms.test.yaml

jobs:
  test-lib-ms:
    permissions:
      contents: read  # Required for checking out the code
    name: Test library microservice
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        working-directory: servers/lib

    steps:
      - name: Checkout
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          lfs: false

      - name: Setup node
        # v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"
          cache-dependency-path: "**/yarn.lock"

      - name: Install pm2 and jest
        run: |
          npm install -g pm2
          npm install -g jest

      - name: Run the linting checks and formatting
        run: |
          yarn install
          yarn syntax
          yarn format

      - name: Build the lib microservice
        run: |
          yarn build

      - name: Run all tests
        run: |
          yarn build
          yarn test:all

      - name: Upload test coverage to Codecov
        # v7.0.0
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: servers/lib/coverage/clover.xml
          flags: lib-microservice-tests

      - name: Update configuration
        env:
          LIBMS_LOCAL_PATH: ${{ github.workspace }}/developer/files
          LIBMS_PORT: ${{ env.HTTP_PORT }}
        run: |
          node test/update-config.js

      - name: Start http mode
        env:
          LIBMS_CONFIG_PATH: ${{ env.LIBMS_CONFIG_PATH }}
        run: |
          yarn build
          yarn start:pm2

      - name: Check server is running (Windows)
        if: runner.os == 'Windows'
        env:
          PORT: ${{ env.HTTP_PORT }}
        # v4.0.0
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_seconds: 10
          max_attempts: 4
          command: |
            Invoke-WebRequest `
              -Uri http://localhost:${{ env.PORT }}/lib/files `
              -Method Head `
              -UseBasicParsing

      - name: Check server is running (Linux)
        if: runner.os != 'Windows'
        env:
          PORT: ${{ env.HTTP_PORT }}
        # v4.0.0
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_seconds: 10
          max_attempts: 4
          command: "curl -f -LI http://localhost:${{ env.PORT }}/lib/files"

      - name: Run http test
        env:
          PORT: ${{ env.HTTP_PORT }}
          LOCAL_PATH: ${{ github.workspace }}/developer/files
          MODE: local
          LOG_LEVEL: debug
          APOLLO_PATH: /lib
        run: |
          yarn test:http-github

      - name: Stop http mode
        run: |
          yarn stop:pm2

  build-docker-image:
    name: Build Docker image
    permissions:
      contents: read
    uses: ./.github/workflows/docker-build.yml
    with:
      image-name: libms
      dockerfile: libms.dockerfile

  get-version:
    permissions:
      contents: read  # Required for checking out the code
    name: Get version and variables
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: get version
        id: get-version
        run: |
          version=$(jq -r '.version' ./servers/lib/package.json)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "node-version=$NODE_VERSION" >> $GITHUB_OUTPUT
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      node-version: ${{ steps.get-version.outputs.node-version }}

  publish-package-github:
    permissions:
      contents: read  # Required for checking out the code
      packages: write  # Required for github package registry
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/feature/distributed-demo'

    name: Publish to GitHub Packages
    needs: [get-version, test-lib-ms]
    uses: ./.github/workflows/publish-npm.yml
    with:
      node-version: ${{ needs.get-version.outputs.node-version }}
      registry-url: 'https://npm.pkg.github.com/'
      directory: servers/lib
      package-name: ${{ vars.PACKAGE_NAME || '' }}
    secrets:
      NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-package-npm:
    permissions:
      contents: read  # Required for checking out the code
      packages: write  # Required by the publish-npm reusable workflow
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/feature/distributed-demo'

    name: Publish to NPM
    needs: [get-version, test-lib-ms]
    uses: ./.github/workflows/publish-npm.yml
    with:
      node-version: ${{ needs.get-version.outputs.node-version }}
      registry-url: 'https://registry.npmjs.org'
      directory: servers/lib
      package-name: ${{ vars.PACKAGE_NAME || '' }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker-image-ghcr:
    permissions:
      contents: read  # Required for checking out the code
      packages: write  # Required for publishing to github package registry
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/feature/distributed-demo'

    name: Publish Docker image (GHCR)
    needs: [get-version, test-lib-ms]
    uses: ./.github/workflows/docker-ghcr.yml
    with:
      image-name: libms
      version: ${{ needs.get-version.outputs.version }}
      dockerfile: libms.dockerfile
    secrets: inherit

  publish-docker-image-dockerhub:
    permissions:
      contents: read  # Required for checking out the code
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/feature/distributed-demo'

    name: Publish Docker image (DockerHub)
    needs: [get-version, test-lib-ms]
    uses: ./.github/workflows/docker-dockerhub.yml
    with:
      image-name: libms
      version: ${{ needs.get-version.outputs.version }}
      dockerfile: libms.dockerfile
      readme-file: servers/lib/DOCKER.md
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_SCOPE: ${{ secrets.DOCKERHUB_SCOPE }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
