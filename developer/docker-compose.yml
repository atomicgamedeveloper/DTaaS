services:
  traefik:
    image: traefik:v3.6.13
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--entrypoints.web.forwardedHeaders.insecure=true"
      - "--entrypoints.web.proxyProtocol.insecure=true"
      - "--log.level=DEBUG"
    labels:
      - "traefik.http.middlewares.cors.headers.accessControlAllowOriginList=http://localhost,http://host.docker.internal"
      - "traefik.http.middlewares.cors.headers.accessControlAllowMethods=GET,OPTIONS,POST"
      - "traefik.http.middlewares.cors.headers.accessControlAllowCredentials=true"
      - "traefik.http.routers.myservice.rule=Host(`myservice.localhost`)"
      - "traefik.http.services.myservice.loadbalancer.server.port=80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend
      - users

  client:
    build:
      context: ../
      dockerfile: developer/client.dockerfile
    restart: unless-stopped
    volumes:
      - "./config/client.js:/dtaas/client/build/env.js"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.entryPoints=web"
      - "traefik.http.services.client.loadbalancer.server.port=4000"
      - "traefik.http.routers.client.middlewares=traefik-forward-auth"
      - "traefik.http.routers.client.rule=PathPrefix(`/`)"
    networks:
      - frontend

  libms:
    build:
      context: ../
      dockerfile: developer/libms.dockerfile
    restart: unless-stopped
    volumes:
      - "./files:/dtaas/libms/files"
      - "./config/libms.dev.yaml:/dtaas/libms/config/libms.yaml"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.libms.entryPoints=web"
      - "traefik.http.services.libms.loadbalancer.server.port=4001"
      - "traefik.http.routers.libms.rule=PathPrefix(`/lib`)"
      - "traefik.http.routers.libms.middlewares=traefik-forward-auth"
    networks:
      - frontend

  logger-ms:
    build:
      context: ../
      dockerfile: developer/logger.dockerfile
    restart: unless-stopped
    user: "0:0"
    environment:
      - LOGGER_HOSTNAME=0.0.0.0
    volumes:
      - "./files/logs:/dtaas/logger/logs"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.logger-ms.entryPoints=web"
      - "traefik.http.services.logger-ms.loadbalancer.server.port=4003"
      - "traefik.http.routers.logger-ms.middlewares=traefik-forward-auth,logger-rate-limit"
      - "traefik.http.routers.logger-ms.rule=PathPrefix(`/logger`)"
      - "traefik.http.middlewares.logger-rate-limit.ratelimit.average=20"
      - "traefik.http.middlewares.logger-rate-limit.ratelimit.burst=50"
    networks:
      - frontend

  user1:
    image: intocps/workspace:main-967bc10
    restart: unless-stopped
    volumes:
      - "./files/common:/workspace/common"
      - "./files/${USERNAME1}:/workspace"
    environment:
      - MAIN_USER=${USERNAME1}
    shm_size: 512m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u1.entryPoints=web"
      - "traefik.http.routers.u1.rule=PathPrefix(`/${USERNAME1}`)"
      - "traefik.http.routers.u1.middlewares=traefik-forward-auth"
    networks:
      - users

  user2:
    image: intocps/workspace:main-967bc10
    restart: unless-stopped
    volumes:
      - "./files/common:/workspace/common"
      - "./files/${USERNAME2}:/workspace"
    environment:
      - MAIN_USER=${USERNAME2}
    shm_size: 512m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.u2.entryPoints=web"
      - "traefik.http.routers.u2.rule=PathPrefix(`/${USERNAME2}`)"
      - "traefik.http.routers.u2.middlewares=traefik-forward-auth"
    networks:
      - users

  traefik-forward-auth:
    image: thomseddon/traefik-forward-auth:latest
    restart: unless-stopped
    volumes:
      - "./config/conf.dev:/conf"
    environment:
      - DEFAULT_PROVIDER=generic-oauth
      - PROVIDERS_GENERIC_OAUTH_AUTH_URL=${OAUTH_URL}/oauth/authorize
      - PROVIDERS_GENERIC_OAUTH_TOKEN_URL=${OAUTH_URL}/oauth/token
      - PROVIDERS_GENERIC_OAUTH_USER_URL=${OAUTH_URL}/api/v4/user
      - PROVIDERS_GENERIC_OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - PROVIDERS_GENERIC_OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - PROVIDERS_GENERIC_OAUTH_SCOPE=read_user
      - SECRET=${OAUTH_SECRET}
      # INSECURE_COOKIE is required if not using a https entrypoint
      - INSECURE_COOKIE=true
      - CONFIG=/conf
      - LOG_LEVEL=debug
    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.redirect.entryPoints=web"
      - "traefik.http.routers.redirect.rule=PathPrefix(`/_oauth`)"
      - "traefik.http.routers.redirect.middlewares=traefik-forward-auth"

      - "traefik.http.middlewares.traefik-forward-auth.forwardauth.address=http://traefik-forward-auth:4181"
      - "traefik.http.middlewares.traefik-forward-auth.forwardauth.authResponseHeaders=X-Forwarded-User"
      - "traefik.http.services.traefik-forward-auth.loadbalancer.server.port=4181"
    networks:
      - frontend
      - users

networks:
  frontend:
    name: dtaas-frontend
  users:
    name: dtaas-users
