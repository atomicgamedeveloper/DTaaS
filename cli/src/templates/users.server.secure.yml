container_name: dtaas-cli-${username}
image: intocps/workspace:main-967bc10
restart: unless-stopped
volumes:
  - "${DTAAS_DIR}/files/common:/workspace/common"
  - "${DTAAS_DIR}/files/${username}:/workspace"
environment:
  - MAIN_USER=${username}
labels:
  - "traefik.enable=true"
  - "traefik.http.routers.${username}.entryPoints=web-secure"
  - "traefik.http.routers.${username}.tls=true"
  - "traefik.http.routers.${username}.middlewares=traefik-forward-auth"
  - >-
    traefik.http.routers.${username}.rule=Host(`${SERVER_DNS}`)
    && PathPrefix(`/${username}`)
networks:
  - users
