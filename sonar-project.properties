# SonarQube Cloud CI-based scanner settings.
# Forks provide project identity through GitHub repository variables.

sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

sonar.exclusions=client/yarn.lock,servers/lib/yarn.lock,servers/logger/yarn.lock,servers/execution/runner/yarn.lock,cli/poetry.lock,deploy/services/cli/poetry.lock
